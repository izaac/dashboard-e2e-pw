name: PR E2E (k3d)

# Validates PRs by running tag-scoped slices of the suite against a Rancher
# provisioned with the k3d provider (Helm chart on k3s-in-docker), the
# post-docker-install form. The Rancher image tag, chart line, and matching
# rancher/dashboard ref are resolved from the branch the PR TARGETS via
# branches-metadata.json — release branches automatically test against their
# own rancher line and dashboard line (upstream rancher/dashboard mechanism).
#
# Two-job shape (mirrors upstream's split-by-tag test matrix):
#   build-dashboard  — runs once, resolves targets, builds the dashboard dist
#                      from the matched ref, publishes it as a workflow
#                      artifact for the matrix to consume.
#   e2e-k3d (matrix) — one runner per tag group; each spins up its own k3d
#                      cluster, downloads the prebuilt dist, mounts it over
#                      the rancher pod, and runs the suite filtered by tag.
#
# Single-cluster per matrix leg (each leg has its own runner): GitHub-hosted
# standard runners have 4 vCPU / 16 GiB which fits one Rancher comfortably.
# Sharded two-cluster runs stay a local/self-hosted flow.

on:
  pull_request:
    branches: [main, release-*]
  # Manual override for testing a specific rancher/dashboard ref against the
  # suite (e.g. validating a dashboard PR from outside the dashboard repo).
  workflow_dispatch:
    inputs:
      dashboard_ref:
        description: "rancher/dashboard ref to build and mount (overrides branches-metadata.json)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  K3D_VERSION: v5.8.3
  K3D_SHA256: dbaa79a76ace7f4ca230a1ff41dc7d8a5036a8ad0309e9c54f9bf3836dbe853e

jobs:
  build-dashboard:
    name: Build branch-matched dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      rancher_image_tag: ${{ steps.resolve.outputs.RANCHER_IMAGE_TAG }}
      rancher_release: ${{ steps.resolve.outputs.RANCHER_RELEASE }}
      dashboard_sha: ${{ steps.resolve.outputs.DASHBOARD_SHA }}
    steps:
      - uses: actions/checkout@v5

      # Resolve the branch-matched targets with the same script developers run
      # locally, so CI and local share one implementation (scripts/k3d-e2e.sh).
      # It reads branches-metadata.json, falls back to main for unknown
      # branches, and hard-fails when no dashboard mapping resolves.
      - name: Resolve targets from target branch
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          BASE: ${{ github.base_ref || 'main' }}
          DASHBOARD_REF: ${{ inputs.dashboard_ref }}
        run: scripts/k3d-e2e.sh resolve | tee -a "$GITHUB_OUTPUT"

      # Cache the BUILT dist keyed on the dashboard SHA, not the ref. master
      # moves a few times a day; building from source costs ~8 minutes
      # (yarn install + vue-cli-service build). With the cache, runs that
      # share a SHA reuse the dist in seconds. Cache misses still build.
      - name: Cache dashboard dist
        id: dashboard-cache
        uses: actions/cache@v4
        with:
          path: dashboard-src/dist
          key: dashboard-dist-${{ steps.resolve.outputs.DASHBOARD_SHA }}

      # scripts/k3d-e2e.sh build clones the matched ref into dashboard-src and
      # builds the dist inside the node image (FHS toolchain, matches local) —
      # exactly the command a developer runs locally. Skipped on cache hit.
      - name: Build dashboard
        if: steps.dashboard-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE: ${{ github.base_ref || 'main' }}
          DASHBOARD_REF: ${{ inputs.dashboard_ref }}
        run: scripts/k3d-e2e.sh build

      # Hand the dist to the matrix legs. Always upload regardless of cache
      # hit — the dist is at dashboard-src/dist either way (cache restore on
      # hit, fresh build on miss). 1-day retention keeps storage cost
      # negligible while leaving room for re-run-failed jobs the same day.
      - name: Upload dashboard dist
        uses: actions/upload-artifact@v5
        with:
          name: dashboard-dist
          path: dashboard-src/dist
          retention-days: 1
          if-no-files-found: error

  e2e-k3d:
    name: "${{ matrix.tag.name }} via k3d (branch-matched rancher)"
    needs: build-dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # Each tag group is independent — one slice failing should not skip the
      # rest, both ran their own cluster and each gives signal on its area.
      fail-fast: false
      matrix:
        tag:
          # Demonstrates the upstream split-by-tag pattern. Add another entry
          # here to fan out further; storage and compute cost scale linearly
          # (build-dashboard runs once, only the matrix legs duplicate).
          - { name: "@generic",    grep: "@generic" }
          - { name: "@navigation", grep: "@navigation" }
    env:
      # k3d-rancher.sh reads these to pick the chart line and image tag for
      # the cluster, so the matrix legs target whatever the resolve step
      # locked in.
      RANCHER_IMAGE_TAG: ${{ needs.build-dashboard.outputs.rancher_image_tag }}
      RANCHER_RELEASE: ${{ needs.build-dashboard.outputs.rancher_release }}
      DASHBOARD_SHA: ${{ needs.build-dashboard.outputs.dashboard_sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Download dashboard dist
        uses: actions/download-artifact@v5
        with:
          name: dashboard-dist
          path: dashboard-src/dist

      - name: Install k3d (pinned + checksum)
        run: |
          curl -fsSLo k3d "https://github.com/k3d-io/k3d/releases/download/${K3D_VERSION}/k3d-linux-amd64"
          echo "${K3D_SHA256}  k3d" | sha256sum -c -
          chmod +x k3d
          sudo mv k3d /usr/local/bin/k3d
          k3d version

      - name: Pre-create artifact dirs with runner ownership
        run: mkdir -p test-results playwright-report

      - name: Checkout muster
        uses: actions/checkout@v5
        with:
          repository: izaac/muster
          path: muster

      - name: Provision rancher on k3d (mount branch-matched dashboard)
        env:
          DASHBOARD_DIST: ${{ github.workspace }}/dashboard-src/dist
        run: |
          ./muster/muster up --instance e2e
          ./muster/muster env --instance e2e > /tmp/muster-env-e2e

      # Resource snapshot after rancher is up, before tests run. Cheap and
      # gives us concrete numbers to decide whether the standard runner (4
      # vCPU / 16 GiB / 14 GB SSD) has enough headroom — locally we saw
      # ~3 GiB per cluster but GH-hosted has docker/system overhead on top.
      - name: Diagnostics — runner + cluster resources
        if: always()
        run: |
          echo "--- host: free -h ---"
          free -h
          echo "--- host: df -h ---"
          df -h /
          echo "--- docker system df ---"
          docker system df
          echo "--- k3d node container stats ---"
          docker stats --no-stream --format '{{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}' || true
          KUBECONFIG=$(k3d kubeconfig write e2e)
          echo "--- pod resource usage (metrics-server) ---"
          kubectl --kubeconfig "$KUBECONFIG" top pods -A 2>/dev/null || echo "metrics-server not yet ready"
          echo "--- cattle-system pod status ---"
          kubectl --kubeconfig "$KUBECONFIG" -n cattle-system get pods -o wide || true

      - name: Run ${{ matrix.tag.name }} tests
        run: HOST_UID=$(id -u) HOST_GID=$(id -g) bash scripts/k3d-run.sh
        env:
          GREP_TAGS: ${{ matrix.tag.grep }}
          # Strip credential-bearing artifacts before they hit a public artifact
          # bucket: traces capture Authorization headers and session cookies;
          # videos capture the whole login flow.
          TEST_NO_VIDEOS: "true"
          TEST_NO_TRACES: "true"

      - name: Capture rancher pod logs
        if: always()
        run: kubectl --kubeconfig $(k3d kubeconfig write e2e) -n cattle-system logs -l app=rancher > rancher-e2e.log 2>&1 || true

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v5
        # Only on failure — green runs leave nothing in storage. Public-repo
        # storage above the 500 MB free quota is billed at $0.25/GB/month, so
        # uploading rancher logs and screenshots on every green run adds up.
        if: failure()
        with:
          # Matrix-namespaced so the two legs do not collide on the same name.
          name: e2e-k3d-${{ matrix.tag.name }}
          path: |
            test-results/**/*.png
            rancher-e2e.log
          retention-days: 3

      - name: Teardown
        if: always()
        run: ./muster/muster down --instance e2e
