name: CI

on:
  push:
    branches: [main, release-*]
  pull_request:
    branches: [main, release-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: ESLint
        run: npx eslint .

      - name: Prettier
        run: npx prettier --check '**/*.ts'

      - name: Markdown
        run: yarn lint:md

      - name: TypeScript
        run: npx tsc --noEmit

  smoke:
    name: Smoke Tests (@generic)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Pre-create artifact dirs with runner ownership
        run: mkdir -p test-results playwright-report

      - name: Run @generic tests against live Rancher
        run: HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose up --build --abort-on-container-exit --exit-code-from tests --no-attach rancher
        env:
          GREP_TAGS: "@generic"
          # Strip credential-bearing artifacts before they hit a public artifact
          # bucket: traces capture Authorization headers and session cookies;
          # videos capture the whole login flow.
          TEST_NO_VIDEOS: "true"
          TEST_NO_TRACES: "true"

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: smoke-screenshots
          path: test-results/**/*.png
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose down -v
