name: CI

on:
  push:
    branches: [main, release-*]
  pull_request:
    branches: [main, release-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: ESLint
        run: npx eslint .

      - name: Prettier
        run: npx prettier --check '**/*.ts'

      - name: Markdown
        run: yarn lint:md

      - name: TypeScript
        run: npx tsc --noEmit

  # The docker-compose Smoke Tests job was superseded by the k3d-based
  # PR E2E workflow (.github/workflows/e2e-k3d-pr.yml), which also pins
  # the rancher image to the PR's target branch and overrides the UI
  # with the matching dashboard build. The docker single-container
  # install is being deprecated upstream so this lane has no future.
