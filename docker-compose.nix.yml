# NixOS override — builds a Rancher image with iptables-nft shim.
#
# NixOS kernels lack legacy iptables modules. This compose file builds
# a patched Rancher image (Dockerfile.rancher-nix) that swaps iptables-legacy
# for iptables-nft so k3s networking works on nftables-only kernels.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.nix.yml up
#
# Not needed on distros with legacy iptables kernel modules.

x-rancher-nix: &rancher-nix
  build:
    context: .
    dockerfile: Dockerfile.rancher-nix
    args:
      RANCHER_IMAGE: ${RANCHER_IMAGE:-docker.io/rancher/rancher:v2.14.0}
  image: rancher-nft:local

services:
  # Single-instance override (docker-compose.yml)
  rancher:
    <<: *rancher-nix

  # Sharded overrides (docker-compose.sharded.yml)
  rancher-1:
    <<: *rancher-nix
  rancher-2:
    <<: *rancher-nix
  rancher-3:
    <<: *rancher-nix
  rancher-4:
    <<: *rancher-nix
