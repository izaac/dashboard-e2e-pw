# PROVIDER=k3d overlay for sharded runs.
# Usage (via scripts/sharded-runs.sh with PROVIDER=k3d):
#   docker compose -f docker-compose.sharded.yml -f docker-compose.sharded.k3d.yml up -d
#
# Rancher does not run in compose here — scripts/k3d-rancher.sh provisions one
# k3d cluster per instance (e2e-1, e2e-2) and writes /tmp/k3d-rancher-<inst>.env
# with the TEST_BASE_URL and network name. The shard containers attach to those
# k3d networks to reach the cluster loadbalancers; sslip.io hostnames resolve to
# the loadbalancer IPs from anywhere.

services:
  # Provisioned by k3d instead — the docker-provider profile keeps these out of
  # a plain `up` while leaving the docker path intact without this overlay.
  rancher-1:
    profiles: ["docker-provider"]
  rancher-2:
    profiles: ["docker-provider"]

  shard-1:
    # Rancher readiness is guaranteed by k3d-rancher.sh before compose up.
    depends_on: !reset []
    networks: !override
      k3d-e2e-1:
    environment:
      TEST_BASE_URL: ${SHARD1_TEST_BASE_URL:?run scripts/k3d-rancher.sh up e2e-1 and source its env file}
    # See docker-compose.k3d.yml for the rationale on this anonymous volume.
    volumes:
      - /app/dashboard-src

  shard-2:
    depends_on: !reset []
    networks: !override
      k3d-e2e-2:
    environment:
      TEST_BASE_URL: ${SHARD2_TEST_BASE_URL:?run scripts/k3d-rancher.sh up e2e-2 and source its env file}
    volumes:
      - /app/dashboard-src

networks:
  k3d-e2e-1:
    external: true
  k3d-e2e-2:
    external: true
