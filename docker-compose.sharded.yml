# Sharded test execution — 2 Rancher instances running tests in parallel.
# Usage: docker compose -f docker-compose.sharded.yml up
# NixOS: docker compose -f docker-compose.sharded.yml -f docker-compose.nix.yml up
# Results merged into playwright-report/ after all shards complete.

services:
  rancher-1:
    image: ${RANCHER_IMAGE:-docker.io/rancher/rancher:head}
    privileged: true
    restart: unless-stopped
    environment:
      CATTLE_BOOTSTRAP_PASSWORD: ${RANCHER_PASSWORD:-password1234}
      CATTLE_AGENT_IMAGE: docker.io/rancher/rancher-agent:head
    volumes:
      - rancher-1-data:/var/lib/rancher
    networks:
      e2e:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost/dashboard/auth/login", "-o", "/dev/null", "-w", "%{http_code}", "--max-time", "3"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s

  rancher-2:
    image: ${RANCHER_IMAGE:-docker.io/rancher/rancher:head}
    privileged: true
    restart: unless-stopped
    environment:
      CATTLE_BOOTSTRAP_PASSWORD: ${RANCHER_PASSWORD:-password1234}
      CATTLE_AGENT_IMAGE: docker.io/rancher/rancher-agent:head
    volumes:
      - rancher-2-data:/var/lib/rancher
    networks:
      e2e:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost/dashboard/auth/login", "-o", "/dev/null", "-w", "%{http_code}", "--max-time", "3"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s

  shard-1:
    build: .
    depends_on:
      rancher-1:
        condition: service_healthy
    networks:
      e2e:
    environment:
      TEST_BASE_URL: https://rancher-1/dashboard
      CATTLE_BOOTSTRAP_PASSWORD: ${RANCHER_PASSWORD:-password1234}
      TEST_PASSWORD: ${RANCHER_PASSWORD:-password1234}
      TEST_USERNAME: admin
      GREP_TAGS: ${GREP_TAGS:-}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    # Run as root so the named /blobs volume is writable; chown the bind-mounted
    # test-results back to the host user at the end. After the test run, copy
    # the blob with a shard-unique name into /blobs so the merge container has
    # both. The anonymous volume on /app/blob-report isolates shards from each
    # other (otherwise both would race on the host-mounted ./blob-report and
    # only the last-finishing shard's report would survive).
    command: ["sh", "-c", "npx playwright test --shard=1/2 --reporter=blob; rc=$$?; cp /app/blob-report/*.zip /blobs/shard-1.zip 2>/dev/null; chown -R ${HOST_UID:-1000}:${HOST_GID:-100} /app/test-results 2>/dev/null; echo $$rc > /blobs/shard-1.exit"]
    volumes:
      # Bind-mount source so test/PO updates apply without rebuilding the
      # image. Anonymous volume on /app/node_modules keeps the image-installed
      # deps (built via `RUN yarn install`) instead of shadowing with host's copy.
      - .:/app
      - /app/node_modules
      - /app/blob-report
      - blob-reports:/blobs
      - ./test-results:/app/test-results

  shard-2:
    build: .
    depends_on:
      rancher-2:
        condition: service_healthy
    networks:
      e2e:
    environment:
      TEST_BASE_URL: https://rancher-2/dashboard
      CATTLE_BOOTSTRAP_PASSWORD: ${RANCHER_PASSWORD:-password1234}
      TEST_PASSWORD: ${RANCHER_PASSWORD:-password1234}
      TEST_USERNAME: admin
      GREP_TAGS: ${GREP_TAGS:-}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    command: ["sh", "-c", "npx playwright test --shard=2/2 --reporter=blob; rc=$$?; cp /app/blob-report/*.zip /blobs/shard-2.zip 2>/dev/null; chown -R ${HOST_UID:-1000}:${HOST_GID:-100} /app/test-results 2>/dev/null; echo $$rc > /blobs/shard-2.exit"]
    volumes:
      - .:/app
      - /app/node_modules
      - /app/blob-report
      - blob-reports:/blobs
      - ./test-results:/app/test-results

  merge:
    build: .
    depends_on:
      shard-1:
        condition: service_started
      shard-2:
        condition: service_started
    networks:
      e2e:
    entrypoint: ["sh", "-c"]
    # Merge writes the HTML report directly to /app/playwright-report (host's
    # ./playwright-report via the bind-mount), so no second cp step is needed.
    command:
      - |
        echo "Waiting for all 2 shards to complete..."
        while [ $$(ls /blobs/shard-*.exit 2>/dev/null | wc -l) -lt 2 ]; do sleep 5; done
        echo "All shards done. Merging reports..."
        mkdir -p /blobs/zips
        cp /blobs/shard-*.zip /blobs/zips/ 2>/dev/null || true
        zip_count=$$(ls /blobs/zips/*.zip 2>/dev/null | wc -l)
        if [ "$$zip_count" -lt 2 ]; then
          echo "Expected 2 blob reports, found $$zip_count — merge skipped"
        else
          npx playwright merge-reports /blobs/zips --reporter=html
          chown -R ${HOST_UID:-1000}:${HOST_GID:-100} /app/playwright-report 2>/dev/null
          echo "Report written to playwright-report/"
        fi
        echo ""
        echo "=== Shard exit codes ==="
        for f in /blobs/shard-*.exit; do echo "$$(basename $$f .exit): exit $$(cat $$f)"; done
    volumes:
      - .:/app
      - /app/node_modules
      - blob-reports:/blobs

networks:
  e2e:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  rancher-1-data:
  rancher-2-data:
  blob-reports:
