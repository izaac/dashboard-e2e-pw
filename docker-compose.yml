services:
  rancher:
    image: ${RANCHER_IMAGE:-docker.io/rancher/rancher:head}
    privileged: true
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CATTLE_BOOTSTRAP_PASSWORD: ${RANCHER_PASSWORD:-admin}
      CATTLE_AGENT_IMAGE: docker.io/rancher/rancher-agent:head
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost/dashboard/auth/login"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s

  tests:
    build: .
    depends_on:
      rancher:
        condition: service_healthy
    environment:
      TEST_BASE_URL: https://rancher/dashboard
      CATTLE_BOOTSTRAP_PASSWORD: ${RANCHER_PASSWORD:-admin}
      TEST_PASSWORD: ${RANCHER_PASSWORD:-admin}
      TEST_USERNAME: admin
      GREP_TAGS: ${GREP_TAGS:-}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
