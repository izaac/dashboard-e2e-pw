services:
  rancher:
    image: ${RANCHER_IMAGE:-docker.io/rancher/rancher:head}
    privileged: true
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      CATTLE_BOOTSTRAP_PASSWORD: ${RANCHER_PASSWORD:-password1234}
      CATTLE_AGENT_IMAGE: docker.io/rancher/rancher-agent:head
    volumes:
      - rancher-data:/var/lib/rancher
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost/dashboard/auth/login"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s

  tests:
    build: .
    depends_on:
      rancher:
        condition: service_healthy
    environment:
      TEST_BASE_URL: https://rancher/dashboard
      CATTLE_BOOTSTRAP_PASSWORD: ${RANCHER_PASSWORD:-password1234}
      TEST_PASSWORD: ${RANCHER_PASSWORD:-password1234}
      TEST_USERNAME: admin
      GREP_TAGS: ${GREP_TAGS:-}
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    # Run as host user so files written via the bind-mount are owned by the host
    # user, not root. HOST_UID/HOST_GID default to 1000:1000 (typical Linux user).
    user: "${HOST_UID:-1000}:${HOST_GID:-100}"
    command: ["sh", "-c", "npx playwright test --reporter=line"]
    volumes:
      # Bind-mount source so branch switches are picked up without rebuilding.
      # Anonymous volume on /app/node_modules keeps the image-installed deps
      # (built via `RUN yarn install`) instead of shadowing with host's copy.
      - .:/app
      - /app/node_modules
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report

volumes:
  rancher-data:
